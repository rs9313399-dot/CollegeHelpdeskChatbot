<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Helpdesk Chatbot</title>
    
    <!-- Flask static css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="bg-blobs"></div>

<div class="chat-glass">
    <div class="chat-header">
        <div class="header-row">
            <div class="brand">
                <div class="brand-dot" aria-hidden="true"></div>
                <span>College Helpdesk</span>
            </div>

            <div class="header-actions">
                <a class="link-btn" href="/admin" title="Edit FAQ">Admin</a>
                <button class="clear-btn" onclick="clearChat()" title="Clear chat">Clear</button>
            </div>
        </div>
        <p>Ask about admission, fees, courses, hostel, placement and more.</p>
    </div>

    <div class="chat-body">
        <div class="bot-msg">Hi  How can I help you?</div>
    </div>
    <div class="quick-buttons">
    <button onclick="quickSend('admission')">Admission</button>
    <button onclick="quickSend('fees')">Fees</button>
    <button onclick="quickSend('courses')">Courses</button>
    <button onclick="quickSend('hostel')">Hostel</button>
    </div>

    <!--  YAHI MAIN CHANGE -->
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your question..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>
<div class="footer-credit">
    Made with by <span>Ratnesh Singh</span>
</div>

<!-- Flask static js -->
<script src="{{ url_for('static', filename='chat.js') }}"></script>

</body>
</html>
