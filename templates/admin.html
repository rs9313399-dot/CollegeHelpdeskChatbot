<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - College Helpdesk</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .admin-wrap {
      width: min(980px, 94vw);
      padding: 18px 0;
      position: relative;
    }
    .admin-wrap::before {
      /* faint futuristic grid */
      content: "";
      position: absolute;
      inset: -40px;
      background-image:
        linear-gradient(rgba(148,163,184,0.16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.16) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      mask-image: radial-gradient(circle at center, black 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
    .admin-grid {
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 18px;
    }
    .panel {
      position: relative;
      border-radius: 20px;
      padding: 16px;
      background: radial-gradient(circle at top left, rgba(129,140,248,0.32), transparent 55%),
                  radial-gradient(circle at bottom right, rgba(45,212,191,0.32), transparent 60%),
                  rgba(15,23,42,0.6);
      border: 1px solid rgba(148,163,184,0.45);
      box-shadow:
        0 24px 70px rgba(0,0,0,0.75),
        inset 0 1px 0 rgba(255,255,255,0.22);
      backdrop-filter: blur(18px) saturate(180%);
      color: #e5e7eb;
    }
    .panel::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      border: 1px solid rgba(59,130,246,0.45);
      opacity: 0.2;
      pointer-events: none;
    }
    .admin-title {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 16px;
      color: #e5e7eb;
    }
    .admin-title h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 650;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .admin-title a {
      color: #a5b4fc;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .admin-title a:hover { text-decoration: underline; }
    .topic-list {
      display:flex;
      flex-direction:column;
      gap: 8px;
      max-height: 58vh;
      overflow:auto;
      padding-right: 6px;
    }
    .topic-list::-webkit-scrollbar { width: 8px; }
    .topic-list::-webkit-scrollbar-thumb {
      background: rgba(148,163,184,0.5);
      border-radius: 999px;
    }
    .topic-item {
      padding: 9px 12px;
      border-radius: 14px;
      cursor:pointer;
      border: 1px solid rgba(148,163,184,0.40);
      background: linear-gradient(135deg, rgba(15,23,42,0.8), rgba(30,64,175,0.7));
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      color: #e5e7eb;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 6px;
      transition: 0.22s;
    }
    .topic-item span.key {
      opacity: 0.86;
    }
    .topic-item span.chevron {
      opacity: 0.5;
      font-size: 11px;
    }
    .topic-item:hover {
      background: linear-gradient(135deg, rgba(59,130,246,0.85), rgba(45,212,191,0.85));
      transform: translateY(-1px);
      border-color: rgba(248,250,252,0.55);
      box-shadow: 0 12px 32px rgba(15,23,42,0.75);
    }
    .topic-item.active {
      background: linear-gradient(135deg, rgba(34,197,94,0.95), rgba(59,130,246,0.95));
      border-color: rgba(248,250,252,0.7);
    }
    .row {
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap: wrap;
    }
    .row input,
    .row textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,184,0.6);
      color: #e5e7eb;
      outline: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      transition: 0.22s;
    }
    .row input::placeholder,
    .row textarea::placeholder {
      color: rgba(148,163,184,0.8);
    }
    .row input:focus,
    .row textarea:focus {
      border-color: rgba(129,140,248,0.9);
      box-shadow: 0 0 0 3px rgba(129,140,248,0.45);
    }
    .row textarea { min-height: 190px; resize: vertical; }
    .btn {
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid rgba(129,140,248,0.8);
      background: radial-gradient(circle at top, rgba(129,140,248,0.85), rgba(59,130,246,0.95));
      color: #f9fafb;
      font-weight: 600;
      cursor: pointer;
      transition: 0.22s;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .btn:hover {
      transform: translateY(-1px) translateX(0);
      box-shadow: 0 10px 28px rgba(15,23,42,0.9);
      filter: brightness(1.05);
    }
    .btn.danger {
      border-color: rgba(248,113,113,0.9);
      background: radial-gradient(circle at top, rgba(248,113,113,0.9), rgba(220,38,38,0.95));
    }
    .btn.danger:hover {
      background: radial-gradient(circle at top, rgba(252,165,165,1), rgba(220,38,38,1));
    }
    .hint {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 8px;
      line-height: 1.35;
      color: #cbd5f5;
    }
    .status {
      font-size: 11px;
      opacity: 0.85;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    @media (max-width: 820px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blobs"></div>

  <div class="admin-wrap">
    <div class="admin-title">
      <h2>Admin • FAQ Topics</h2>
      <a href="/">Back to chat</a>
    </div>

    <div class="admin-grid">
      <div class="panel">
        <div class="row" style="margin-bottom: 10px;">
          <input id="newTopic" type="text" placeholder="New topic key (e.g. exams)" />
          <button class="btn" id="createBtn" type="button">Create</button>
        </div>
        <div class="topic-list" id="topicList"></div>
      </div>

      <div class="panel">
        <div class="row" style="justify-content: space-between;">
          <div class="status" id="status">Select a topic to edit.</div>
          <div class="row" style="gap: 8px;">
            <button class="btn" id="saveBtn" type="button" disabled>Save</button>
            <button class="btn danger" id="deleteBtn" type="button" disabled>Delete</button>
          </div>
        </div>

        <div style="height: 10px;"></div>

        <div class="row">
          <input id="topicKey" type="text" placeholder="Topic key" disabled />
        </div>
        <div style="height: 10px;"></div>
        <div class="row">
          <textarea id="topicValue" placeholder="Topic value (string or JSON array)"></textarea>
        </div>

        <div class="hint">
          Tip: For multiple replies, store a JSON array, e.g. <code>["Answer 1","Answer 2"]</code>.
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentTopic = null;

    const elList = document.getElementById("topicList");
    const elNewTopic = document.getElementById("newTopic");
    const elCreate = document.getElementById("createBtn");
    const elSave = document.getElementById("saveBtn");
    const elDelete = document.getElementById("deleteBtn");
    const elKey = document.getElementById("topicKey");
    const elValue = document.getElementById("topicValue");
    const elStatus = document.getElementById("status");

    function setStatus(t) { elStatus.textContent = t; }

    function safeParseValue(txt) {
      const raw = (txt || "").trim();
      if (!raw) return "";
      if (raw.startsWith("[") || raw.startsWith("{") || raw.startsWith("\"")) {
        try { return JSON.parse(raw); } catch (_) { /* fallthrough */ }
      }
      return raw;
    }

    async function loadTopics() {
      const res = await fetch("/api/topics");
      const data = await res.json();
      renderTopics(data.topics || []);
    }

    function renderTopics(topics) {
      elList.innerHTML = "";
      topics.forEach(t => {
        const div = document.createElement("div");
        div.className = "topic-item" + (t === currentTopic ? " active" : "");
        div.innerHTML = `<span class="key">${t}</span><span class="chevron">›</span>`;
        div.onclick = () => selectTopic(t);
        elList.appendChild(div);
      });
    }

    async function selectTopic(topic) {
      currentTopic = topic;
      const res = await fetch("/api/topic/" + encodeURIComponent(topic));
      const data = await res.json();
      if (!res.ok) {
        setStatus(data.error || "Failed to load topic");
        return;
      }
      elKey.value = data.topic;
      if (typeof data.value === "string") elValue.value = data.value;
      else elValue.value = JSON.stringify(data.value, null, 2);
      elSave.disabled = false;
      elDelete.disabled = false;
      setStatus("Editing: " + data.topic);
      await loadTopics();
    }

    async function createTopic() {
      const key = (elNewTopic.value || "").trim();
      if (!key) return;
      await fetch("/api/topic/" + encodeURIComponent(key), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ value: "Write answer here." })
      });
      elNewTopic.value = "";
      setStatus("Created: " + key);
      await selectTopic(key);
    }

    async function saveTopic() {
      if (!currentTopic) return;
      const value = safeParseValue(elValue.value);
      const res = await fetch("/api/topic/" + encodeURIComponent(currentTopic), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ value })
      });
      if (res.ok) setStatus("Saved: " + currentTopic);
      else setStatus("Save failed");
    }

    async function deleteTopic() {
      if (!currentTopic) return;
      if (!confirm("Delete topic: " + currentTopic + " ?")) return;
      const res = await fetch("/api/topic/" + encodeURIComponent(currentTopic), { method: "DELETE" });
      if (res.ok) {
        setStatus("Deleted: " + currentTopic);
        currentTopic = null;
        elKey.value = "";
        elValue.value = "";
        elSave.disabled = true;
        elDelete.disabled = true;
        await loadTopics();
      } else setStatus("Delete failed");
    }

    elCreate.onclick = createTopic;
    elSave.onclick = saveTopic;
    elDelete.onclick = deleteTopic;

    loadTopics();
  </script>
</body>
</html>
